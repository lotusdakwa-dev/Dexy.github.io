{% extends "base.html" %}

{% block title %}{{ titre }}{% endblock %}

{% block content %}
<div class="form-card">
    <h1>{{ titre }}</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <a href="{% url redirect_url module_name %}" class="btn btn-muted">Annuler</a>
            <button type="submit" class="btn">Enregistrer</button>
        </div>
    </form>
</div>
{% endblock %}
